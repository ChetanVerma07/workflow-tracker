name: Progress Record

permissions:
  contents: write
  pages: write

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: progress-record-${{ github.ref }}
  cancel-in-progress: false

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Generate random progress
        run: |
          messages=(
            "Refined some logic"
            "Worked on small improvements"
            "Updated structure"
            "Cleaned up code a bit"
            "Minor fixes and tweaks"
            "Improved readability"
            "Adjusted some parts"
            "Experimented with new idea"
            "Optimized a section"
            "Progress update"
          )

          random_index=$((RANDOM % ${#messages[@]}))
          msg=${messages[$random_index]}

          echo "$msg on $(date)" >> log.txt
          echo "MESSAGE=$msg" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config --global user.name "chetan verma"
          git config --global user.email "chetancodesforyou@gmail.com"
          git add .
          git diff --cached --quiet || git commit -m "$MESSAGE - $(date)"
          git push

  deploy:
    needs: commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build
        run: |
          echo "Building application..."
          # Add your build commands here
          # Example: npm install && npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Deployment Complete
        run: echo "Deployment completed successfully!"
