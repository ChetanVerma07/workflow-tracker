name: Progress Record

on:
  schedule:
    - cron: '13 3 * * *'
    - cron: '47 6 * * *'
    - cron: '22 9 * * *'
    - cron: '5 13 * * *'
    - cron: '39 16 * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate random progress
        run: |
          messages=(
            "Refined some logic"
            "Worked on small improvements"
            "Updated structure"
            "Cleaned up code a bit"
            "Minor fixes and tweaks"
            "Improved readability"
            "Adjusted some parts"
            "Experimented with new idea"
            "Optimized a section"
            "Progress update"
          )

          random_index=$((RANDOM % ${#messages[@]}))
          msg=${messages[$random_index]}

          echo "$msg on $(date)" >> log.txt
          echo "MESSAGE=$msg" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config --global user.name "chetan verma"
          git config --global user.email "chetancodesforyou@gmail.com"
          git add .
          git commit -m "$MESSAGE - $(date)" || echo "No changes"
          git push
